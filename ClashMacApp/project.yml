name: ClashMac
options:
  bundleIdPrefix: com.clashmac
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  ClashMac:
    type: application
    platform: macOS
    sources:
      - path: ClashMac
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clashmac.app
      PRODUCT_NAME: "Clash Mac"
      INFOPLIST_KEY_LSUIElement: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: "Clash Mac"
      GENERATE_INFOPLIST_FILE: YES
      ENABLE_HARDENED_RUNTIME: YES
      OTHER_LDFLAGS: ["-lbsm"]
    entitlements:
      path: Config/ClashMac.entitlements
    dependencies:
      - target: ClashMacHelper
        embed: true
        link: false
        copy:
          destination: sharedSupport
          subpath: ""
    copyFiles:
      HelperPlist:
        destination: wrapper
        subpath: Contents/Library/LaunchDaemons
        files:
          - path: Config/com.clashmac.helper.plist
      HelperBinary:
        destination: wrapper
        subpath: Contents/Library/LaunchServices
        files:
          - path: $(BUILT_PRODUCTS_DIR)/ClashMacHelper

  ClashMacHelper:
    type: tool
    platform: macOS
    sources:
      - path: ClashMacHelper
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clashmac.helper
      PRODUCT_NAME: ClashMacHelper
      GENERATE_INFOPLIST_FILE: YES
      SKIP_INSTALL: NO
      OTHER_LDFLAGS: ["-lbsm"]
    entitlements:
      path: Config/ClashMacHelper.entitlements

schemes:
  ClashMac:
    build:
      targets:
        ClashMac: all
        ClashMacHelper: all
    run:
      config: Debug

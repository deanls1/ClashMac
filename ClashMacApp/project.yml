name: ClashMac
options:
  bundleIdPrefix: com.clashmac
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "26.3"
  developmentLanguage: zh-Hans

attributes:
  LastUpgradeCheck: "2630"
  BuildIndependentTargetsInParallel: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  ClashMac:
    type: application
    platform: macOS
    sources:
      - path: ClashMac
        excludes:
          - "Resources/**"
      - path: Shared
    resources:
      - path: ClashMac/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clashmac.app
      PRODUCT_NAME: "Clash Mac"
      INFOPLIST_KEY_LSUIElement: YES
      INFOPLIST_KEY_NSHumanReadableCopyright: "Clash Mac"
      GENERATE_INFOPLIST_FILE: YES
      ENABLE_HARDENED_RUNTIME: YES
      OTHER_LDFLAGS: ["-lbsm", "-lz"]
    entitlements:
      path: Config/ClashMac.entitlements
    dependencies:
      - target: ClashMacHelper
        embed: true
        link: false
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchServices
    copyFiles:
      - name: Copy Helper Plist
        destination: wrapper
        subpath: Contents/Library/LaunchDaemons
        files:
          - Config/com.clashmac.helper.plist
    postBuildScripts:
      - name: Embed Helper LaunchDaemon Plist
        basedOnDependencyAnalysis: false
        inputFiles:
          - $(SRCROOT)/Config/com.clashmac.helper.plist
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(FULL_PRODUCT_NAME)/Contents/Library/LaunchDaemons/com.clashmac.helper.plist
        script: |
          PLIST_DST="${TARGET_BUILD_DIR}/${FULL_PRODUCT_NAME}/Contents/Library/LaunchDaemons"
          mkdir -p "${PLIST_DST}"
          cp "${SRCROOT}/Config/com.clashmac.helper.plist" "${PLIST_DST}/"

  ClashMacHelper:
    type: tool
    platform: macOS
    sources:
      - path: ClashMacHelper
      - path: Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clashmac.helper
      PRODUCT_NAME: ClashMacHelper
      GENERATE_INFOPLIST_FILE: YES
      SKIP_INSTALL: NO
      OTHER_LDFLAGS: ["-lbsm"]
    entitlements:
      path: Config/ClashMacHelper.entitlements

schemes:
  ClashMac:
    build:
      targets:
        ClashMac: all
        ClashMacHelper: all
    run:
      config: Debug
